<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cohérence Cardiaque — SOGECA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f7e8;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--hint:#9ca3af;
  --border:#e5e7eb;--stat:#f9fafb;
  --blue:#899f31;--blue-bg:#f4f7e8;--blue-dark:#2f3711;
  --green:#b8cc55;--green-bg:#e8f0c4;--green-dark:#525f1d;
}
body.dark{
  --bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--sub:#94a3b8;--hint:#64748b;
  --border:#334155;--stat:#0f172a;
  --blue:#b8cc55;--blue-bg:#2a3810;--blue-dark:#c8d87a;
  --green:#b8cc55;--green-bg:#1e2a08;--green-dark:#b8cc55;
}
body.sun{
  --bg:#000;--card:#000;--text:#ffffff;--sub:#e0e0e0;--hint:#aaaaaa;
  --border:#333;--stat:#111;
  --blue:#b8cc55;--blue-bg:#1a2205;--blue-dark:#ffffff;
  --green:#b8cc55;--green-bg:#1a2205;--green-dark:#ffffff;
}
body.sun .app{box-shadow:0 0 0 2px #333;border-radius:16px}
body.sun .circle{border-width:4px}
body.sun .arr{font-size:34px}
body.sun .phase-name{font-size:20px;letter-spacing:.01em}
body.sun .btn-go{background:#60d0ff;color:#000;font-size:17px}
body.sun .btn-rst{color:#aaa;border-color:#333}
body.sun .lang-btn.on{background:#003344;color:#60d0ff;border-color:#60d0ff}
body.sun .r-btn.on{background:#003344;color:#60d0ff;border-color:#60d0ff}
body.sun .d-btn.on{background:#003344;color:#60d0ff;border-color:#60d0ff}
body.sun .motiv{background:#111;border-color:#333}
body.sun .motiv-l1{color:#60d0ff}
body.sun .motiv-l2{color:#aaa}
body.sun .vol-panel{background:#111}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;transition:background .3s}
.app{background:var(--card);border-radius:24px;padding:1.4rem 1.2rem;max-width:380px;width:100%;display:flex;flex-direction:column;align-items:center;gap:1.1rem;box-shadow:0 4px 24px rgba(0,0,0,.08);position:relative}

/* HEADER */
.header{width:100%;display:flex;align-items:center;justify-content:space-between}
.logo-zone{display:flex;align-items:center;gap:8px}
.app-title{font-size:16px;font-weight:600;color:var(--text)}
.app-sub{font-size:11px;color:var(--sub)}
.header-icons{display:flex;gap:6px}
.ico{width:34px;height:34px;border-radius:99px;border:1px solid var(--border);background:var(--stat);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
.ico.on{background:var(--blue-bg);border-color:var(--blue)}
.ico:hover{background:var(--border)}

/* LANG */
.lang-row{display:flex;gap:6px;width:100%}
.lang-btn{flex:1;padding:6px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--stat);color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.lang-btn.on{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue);font-weight:700}

/* RHYTHM */
.rhythm-row{display:flex;gap:8px;width:100%}
.r-btn{flex:1;padding:9px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--stat);color:var(--sub);font-size:13px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit;line-height:1.4}
.r-btn.on{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue);font-weight:600}

/* DURATION */
.dur-row{display:flex;gap:6px;width:100%}
.d-btn{flex:1;padding:6px 4px;border-radius:99px;border:1px solid var(--border);background:var(--stat);color:var(--sub);font-size:12px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.d-btn.on{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue);font-weight:600}

/* SCENE */
.scene{position:relative;width:250px;height:250px;display:flex;align-items:center;justify-content:center;overflow:visible}
.wave{position:absolute;border-radius:50%;border:1.5px solid var(--blue);opacity:0;pointer-events:none}
.circle{position:absolute;width:108px;height:108px;border-radius:50%;background:var(--blue-bg);border:3px solid var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;transition:transform .08s linear}
.circle.teal{background:var(--green-bg);border-color:var(--green)}
.arr{font-size:26px;font-weight:700;color:var(--blue-dark);line-height:1;user-select:none}
.arr.teal{color:var(--green-dark)}
.secs{font-size:12px;font-weight:500;color:var(--blue);margin-top:2px}
.secs.teal{color:var(--green)}
.sogeca-logo{position:absolute;right:-50px;top:50%;transform:translateY(-50%);width:62px;height:auto;opacity:0.18;filter:grayscale(15%);pointer-events:none;z-index:3}

/* PHASE TEXT */
.phase{text-align:center;min-height:38px}
.phase-name{font-size:16px;font-weight:600;color:var(--text)}
.phase-sub{font-size:12px;color:var(--sub);margin-top:2px}

/* PROGRESS */
.prog-wrap{width:100%;display:flex;flex-direction:column;gap:3px}
.prog-track{width:100%;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--blue);width:0%;transition:width .1s linear}
.prog-fill.teal{background:var(--green)}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--hint)}

/* STATS */
.stats{display:flex;gap:8px;width:100%}
.stat{background:var(--stat);border-radius:10px;padding:9px 0;text-align:center;flex:1}
.stat-n{font-size:18px;font-weight:600;color:var(--text)}
.stat-l{font-size:10px;color:var(--hint);margin-top:1px}

/* BUTTONS */
.ctrl{display:flex;gap:10px;width:100%}
.btn-go{flex:2;padding:13px;border-radius:99px;border:none;background:#899f31;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-go:hover{opacity:.88}
.btn-rst{flex:1;padding:13px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit}

/* MOTIVATION CARD */
.motiv{width:100%;display:none;flex-direction:column;align-items:center;gap:5px;background:var(--blue-bg);border:1px solid #B5D4F4;border-radius:14px;padding:1rem 1.1rem;text-align:center;animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
.motiv.show{display:flex}
.motiv-emoji{font-size:26px}
.motiv-l1{font-size:14px;font-weight:500;color:var(--blue-dark)}
.motiv-l2{font-size:12px;color:var(--blue);opacity:.85}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes ripple{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.6);opacity:0}}

/* HINT */
.hint{font-size:11px;color:var(--hint);text-align:center;line-height:1.6}
.footer{font-size:10px;color:var(--hint);opacity:.55;text-align:center}
.footer2{font-size:9px;color:var(--hint);opacity:.4;text-align:center;line-height:1.5;margin-top:2px}

/* TOAST */
.toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--card);font-size:12px;padding:5px 14px;border-radius:99px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}


function toggleInfoPanel(){
  const ov=document.getElementById('infoOverlay');
  const btn=document.getElementById('infoBtn');
  const open=!ov.classList.contains('open');
  ov.classList.toggle('open',open);
  btn.classList.toggle('on',open);
  if(open) renderInfoPanel();
}
function closeInfoBg(e){
  if(e.target===document.getElementById('infoOverlay')) toggleInfoPanel();
}
function renderInfoPanel(){
  document.getElementById('infoCardTitle').textContent=t.infoCardTitle;
  document.getElementById('infoHowTitle').textContent=t.infoHowTitle;
  document.getElementById('infoHowBody').textContent=t.infoHowBody;
  document.getElementById('infoSciTitle').textContent=t.infoSciTitle;
  document.getElementById('infoSciBody').textContent=t.infoSciBody;
  document.getElementById('infoWarnTitle').textContent=t.infoWarnTitle;
  document.getElementById('infoWarnBody').textContent=t.infoWarnBody;
  const refEl=document.getElementById('infoRef'); refEl.textContent=t.infoRef; refEl.style.display=t.infoRef?'block':'none';
  document.getElementById('infoCloseBtn').textContent=t.infoClose;
}

/* ── TAILLE TEXTE ── */
.app.big .app-title{font-size:19px}
.app.big .phase-name{font-size:20px}
.app.big .phase-sub{font-size:15px}
.app.big .arr{font-size:32px}
.app.big .secs{font-size:15px}
.app.big .stat-n{font-size:22px}
.app.big .stat-l{font-size:12px}
.app.big .btn-go{font-size:18px;padding:16px}
.app.big .btn-rst{font-size:16px;padding:16px}
.app.big .r-btn{font-size:16px;padding:11px 6px}
.app.big .d-btn{font-size:14px;padding:8px 4px}
.app.big .lang-btn{font-size:15px;padding:8px 4px}
.app.big .motiv-l1{font-size:16px}
.app.big .motiv-l2{font-size:14px}
.app.big .hint{font-size:13px}
.app.big .prog-labels{font-size:13px}

.app.bigger .app-title{font-size:22px}
.app.bigger .phase-name{font-size:24px}
.app.bigger .phase-sub{font-size:17px}
.app.bigger .arr{font-size:38px}
.app.bigger .secs{font-size:17px}
.app.bigger .stat-n{font-size:26px}
.app.bigger .stat-l{font-size:14px}
.app.bigger .btn-go{font-size:21px;padding:18px}
.app.bigger .btn-rst{font-size:18px;padding:18px}
.app.bigger .r-btn{font-size:18px;padding:13px 6px}
.app.bigger .d-btn{font-size:16px;padding:10px 4px}
.app.bigger .lang-btn{font-size:17px;padding:10px 4px}
.app.bigger .motiv-l1{font-size:18px}
.app.bigger .motiv-l2{font-size:15px}
.app.bigger .hint{font-size:15px}
.app.bigger .prog-labels{font-size:14px}
.ico#fntBtn{font-size:13px;font-weight:700;letter-spacing:-.5px}

/* ── VOLUME PANEL ── */
.vol-panel{width:100%;display:none;align-items:center;gap:10px;background:var(--stat);border-radius:12px;padding:10px 14px}
.vol-panel.show{display:flex}
.vol-icon{font-size:16px;flex-shrink:0}
.vol-slider{flex:1;accent-color:var(--blue);height:4px}
.vol-val{font-size:12px;font-weight:500;color:var(--blue-dark);min-width:32px;text-align:right}

#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#3a4a18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .5s ease}
#splash.fade{opacity:0;pointer-events:none}
#splash.gone{display:none}
.spl-circle{width:100px;height:100px;border-radius:50%;background:#f4f7e8;border:4px solid #b8cc55;display:flex;align-items:center;justify-content:center;font-size:44px;animation:spl-pulse 1.2s ease-in-out infinite}
.spl-title{font-size:22px;font-weight:700;color:#fff}
.spl-sub{font-size:14px;color:#b8cc55}
.spl-bar-bg{width:160px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.spl-bar{height:100%;border-radius:99px;background:#b8cc55;width:0%;animation:spl-load 1.8s ease-out forwards}
@keyframes spl-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes spl-load{0%{width:0%}100%{width:100%}}

.info-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:1.2rem}
.info-overlay.open{display:flex}
.info-card{background:var(--card);border-radius:20px;padding:1.3rem;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.info-card-title{font-size:15px;font-weight:700;color:var(--text);text-align:center;margin-bottom:2px}
.info-block{background:var(--stat);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:4px}
.info-block-title{font-size:12px;font-weight:600;color:var(--text)}
.info-block-body{font-size:11px;color:var(--sub);line-height:1.65}
.info-warn{background:#fff8e1;border:1px solid #f0c040;border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:4px}
.info-warn-title{font-size:12px;font-weight:600;color:#7a5c00}
.info-warn-body{font-size:11px;color:#6b4f00;line-height:1.65}
.info-ref{font-size:10px;color:var(--hint);text-align:center;opacity:.7;line-height:1.5}
.info-close-btn{padding:11px;border-radius:99px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
</style>

<div id="splash">

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo-zone">
    <div>

      <div class="app-sub">SOGECA</div>
    </div>
  </div>

    <button class="ico" id="drkBtn" onclick="toggleDark()">🌙</button>
    <button class="ico" id="fntBtn" onclick="cycleFontSize()" title="Taille du texte">A</button>
    <button class="ico" id="infoBtn" onclick="toggleInfoPanel()">ℹ️</button>
  </div>
</div>

<!-- LANGUE -->
<div class="lang-row">
  <button class="lang-btn on" onclick="setLang('fr',this)">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('en',this)">🇬🇧 EN</button>
  <button class="lang-btn" onclick="setLang('pt',this)">🇵🇹 PT</button>
</div>

<!-- VOLUME -->
<div class="vol-panel" id="volPanel">
  <span class="vol-icon">🔊</span>
  <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70" step="1" oninput="setVolume(this.value)">
  <span class="vol-val" id="volVal">70%</span>
</div>

<!-- RYTHME -->
<div class="rhythm-row">
  <button class="r-btn on" onclick="setRhythm(3,6,this)" id="rb36"></button>
  <button class="r-btn" onclick="setRhythm(4,8,this)" id="rb48"></button>
</div>

<!-- DURÉE -->
<div class="dur-row">
  <button class="d-btn on" onclick="setGoal(3,this)" id="db3"></button>
  <button class="d-btn" onclick="setGoal(5,this)" id="db5"></button>
  <button class="d-btn" onclick="setGoal(10,this)" id="db10"></button>
  <button class="d-btn" onclick="setGoal(0,this)" id="dbFree"></button>
</div>

<!-- SCÈNE -->
<div class="scene">
  <div class="wave" id="w1" style="width:128px;height:128px"></div>
  <div class="wave" id="w2" style="width:160px;height:160px"></div>
  <div class="wave" id="w3" style="width:194px;height:194px"></div>
  <div class="wave" id="w4" style="width:230px;height:230px"></div>
  <div class="circle" id="circ">
    <div class="arr" id="arr">—</div>
    <div class="secs" id="secs">&nbsp;</div>
  </div>
</div>

<!-- PHASE -->
<div class="phase">
  <div class="phase-name" id="pName"></div>
  <div class="phase-sub" id="pSub"></div>
</div>

<!-- PROGRESSION -->
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
  <div class="prog-labels">
    <span id="pLeft">0:00</span>
    <span id="pGoal"></span>
    <span id="pRight">3:00</span>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-n" id="sCycles">0</div><div class="stat-l" id="lCycles"></div></div>
  <div class="stat"><div class="stat-n" id="sTime">0:00</div><div class="stat-l" id="lDur"></div></div>
  <div class="stat"><div class="stat-n" id="sPer">9s</div><div class="stat-l" id="lPer"></div></div>
</div>

<!-- CONTRÔLES -->
<div class="ctrl">
  <button class="btn-go" id="goBtn" onclick="toggle()"></button>
  <button class="btn-rst" id="rstBtn" onclick="reset()"></button>
</div>

<!-- MOTIVATION -->
<div class="motiv" id="motiv">
  <div class="motiv-emoji" id="mEmoji">🌿</div>
  <div class="motiv-l1" id="mL1"></div>
  <div class="motiv-l2" id="mL2"></div>
</div>


<div class="info-overlay" id="infoOverlay" onclick="closeInfoBg(event)">
  <div class="info-card">

    <div class="info-block">

    <div class="info-ref" id="infoRef" style="display:none"></div>
    <button class="info-close-btn" id="infoCloseBtn" onclick="toggleInfoPanel()">Fermer</button>

</div>
<div class="hint" id="hint"></div>
<div class="footer" id="foot"></div>

</div>

let inhale=3, exhale=6, phase='idle', elapsed=0;
let running=false, raf=null, lastTs=null;
let totalSec=0, cycles=0, phaseLen=3, goalSec=180;
let soundMode=0, darkMode=false, soundVol=0.70;
// soundMode: 0=son+vib  1=vib seule  2=silence

const circ=document.getElementById('circ');
const arr=document.getElementById('arr');
const secs=document.getElementById('secs');
const pName=document.getElementById('pName');
const pSub=document.getElementById('pSub');
const pFill=document.getElementById('pFill');

/* ── LANGUE ── */
function setLang(l,btn){

  btn.classList.add('on');
  document.documentElement.lang=l;
  applyLang();

}
function applyLang(){
  document.getElementById('appTitle').textContent=t.appTitle;
  const[r36l,r36s]=t.r36.split('\n');
  document.getElementById('rb36').innerHTML=r36l+'<br><span style="font-size:10px;font-weight:400">'+r36s+'</span>';
  const[r48l,r48s]=t.r48.split('\n');

  document.getElementById('db5').textContent=t.d5;
  document.getElementById('db10').textContent=t.d10;
  document.getElementById('dbFree').textContent=t.dFree;
  document.getElementById('lCycles').textContent=t.cycles;
  document.getElementById('lDur').textContent=t.dur;
  document.getElementById('lPer').textContent=t.per;
  document.getElementById('rstBtn').textContent=t.reset;
  document.getElementById('hint').textContent=t.hint;
  document.getElementById('foot').textContent=t.foot;
  document.getElementById('foot2').textContent=t.foot2;

}
function updateGoalLabel(){
  if(goalSec===0){ pGoal.textContent=t.goalFree; pRight.textContent='—'; }
  else{ const m=Math.round(goalSec/60); pGoal.textContent=t.goal+' '+m+' min'; pRight.textContent=m+':00'; }
}

/* ── RYTHME & DURÉE ── */
function setRhythm(i,e,btn){
  inhale=i; exhale=e;
  document.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('sPer').textContent=(i+e)+'s';
  reset();
}
function setGoal(min,btn){
  goalSec=min*60;
  document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateGoalLabel();
  reset();
}

/* ── AUDIO ── */
const AC=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getCtx(){ if(!actx) actx=new AC(); if(actx.state==='suspended') actx.resume(); return actx; }
function beep(f,d,v){ if(soundMode!==0) return; try{ const c=getCtx(),o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value=f; const vol=v*soundVol; g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d); o.start(c.currentTime); o.stop(c.currentTime+d); }catch(e){} }
function bIn(){ beep(440,.15,.18); setTimeout(()=>beep(520,.12,.12),160); }
function bEx(){ beep(320,.2,.18); setTimeout(()=>beep(260,.15,.12),200); }
function bEnd(){ [520,440,390,440,520].forEach((f,i)=>setTimeout(()=>beep(f,.18,.2),i*120)); }

/* ── VIBRATION ── */
function vib(p){ if(soundMode===2) return; try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }
function vIn(){ vib([30,40,30]); }
function vEx(){ vib([80]); }
function vEnd(){ vib([60,60,60,60,200]); }

/* ── VAGUES ── */
let wTimers=[];
function stopWaves(){ wTimers.forEach(t=>clearTimeout(t)); wTimers=[]; waves.forEach(w=>{ w.style.animation='none'; w.style.opacity=0; }); }
function trigWaves(isIn,dur){
  stopWaves();
  const col=isIn?'var(--blue)':'var(--green)';
  waves.forEach((w,i)=>{
    const ti=setTimeout(()=>{ w.style.borderColor=col; w.style.animation='none'; void w.offsetWidth; w.style.animation='ripple '+(dur*.88)+'s ease-out forwards'; },i*190);
    wTimers.push(ti);
  });
}

/* ── BOUCLE ── */
function toggle(){
  if(!actx) try{getCtx();}catch(e){}
  if(running){ running=false; goBtn.textContent=t.resume; if(raf) cancelAnimationFrame(raf); }
  else{ running=true; goBtn.textContent=t.pause; if(phase==='idle') startPhase('inhale'); lastTs=null; raf=requestAnimationFrame(tick); }
}
function reset(){
  running=false; if(raf) cancelAnimationFrame(raf);
  phase='idle'; elapsed=0; totalSec=0; cycles=0;
  goBtn.textContent=t.start;
  pName.textContent=t.ready; pSub.textContent=t.readySub;
  arr.textContent='—'; secs.innerHTML='&nbsp;';
  pFill.style.width='0%'; pFill.classList.remove('teal');
  circ.style.transform='scale(1)'; circ.classList.remove('teal');
  arr.classList.remove('teal'); secs.classList.remove('teal');
  document.getElementById('sCycles').textContent='0';
  document.getElementById('sTime').textContent='0:00';
  pLeft.textContent='0:00';
  document.getElementById('sPer').textContent=(inhale+exhale)+'s';
  hideMotiv(); stopWaves();
}
function startPhase(p){
  phase=p; elapsed=0;
  if(p==='inhale'){
    phaseLen=inhale;
    pName.textContent=t.inhale; pSub.textContent=t.inSub;
    arr.textContent='↑'; secs.textContent=inhale+' s';
    pFill.classList.remove('teal'); circ.classList.remove('teal'); arr.classList.remove('teal'); secs.classList.remove('teal');
    for(let w of waves) w.style.borderColor='var(--blue)';
    trigWaves(true,inhale); bIn(); vIn();
  } else {
    phaseLen=exhale;
    pName.textContent=t.exhale; pSub.textContent=t.exSub;
    arr.textContent='↓'; secs.textContent=exhale+' s';
    pFill.classList.add('teal'); circ.classList.add('teal'); arr.classList.add('teal'); secs.classList.add('teal');
    for(let w of waves) w.style.borderColor='var(--green)';
    trigWaves(false,exhale); bEx(); vEx();
    cycles++;
    document.getElementById('sCycles').textContent=cycles;
    document.getElementById('sPer').textContent=(inhale+exhale)+'s';
  }
}
function tick(now){
  if(!running) return;
  if(!lastTs) lastTs=now;
  const dt=(now-lastTs)/1000; lastTs=now;
  elapsed+=dt; totalSec+=dt;
  const m=Math.floor(totalSec/60), s=Math.floor(totalSec%60);
  const fmt=m+':'+(s<10?'0':'')+s;
  sTime.textContent=fmt; pLeft.textContent=fmt;
  secs.textContent=Math.max(Math.ceil(phaseLen-elapsed),1)+' s';
  const prog=Math.min(elapsed/phaseLen,1);
  pFill.style.width=(prog*100)+'%';
  circ.style.transform=phase==='inhale'?'scale('+(1+.26*prog)+')':'scale('+(1.26-.26*prog)+')';
  if(goalSec>0 && totalSec>=goalSec){ finishSession(); return; }
  if(elapsed>=phaseLen) startPhase(phase==='inhale'?'exhale':'inhale');
  raf=requestAnimationFrame(tick);
}
function finishSession(){
  running=false; if(raf) cancelAnimationFrame(raf);
  bEnd(); vEnd();
  pName.textContent=t.done; pSub.textContent=t.doneSub;
  goBtn.textContent=t.start;
  showMotiv();
}

  s.classList.add('fade');
  setTimeout(()=>s.classList.add('gone'),600);
}
